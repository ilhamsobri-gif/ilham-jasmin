<html lang="ms">

        @font-face {

            src: url('Cintarini.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

        /* --- CSS STYLES --- */
        body {
            margin: 0; padding: 0; font-family: 'Lato', sans-serif;

        }

        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('welcome-bg.png'); background-size: cover; background-position: center;
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease-out;
        }
        
        .welcome-content {

            animation: fadeIn 2s; width: 80%; max-width: 500px;
        }

        /* Menggunakan fon Playfair Display untuk nama di Welcome Screen */
        .welcome-names {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 10px 0;
            color: white;
        }
        
        .open-btn {
            background-color: #eebbc3; color: #2c3e50; padding: 15px 40px;
            border-radius: 50px; font-size: 1.2rem; cursor: pointer; border: none;
            margin-top: 30px; font-family: 'Playfair Display', serif; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: bounce 2s infinite;
        }

        header {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),

            padding: 80px 20px; color: white;
        }

        /* Menggunakan fon Playfair Display untuk nama di Header */

            font-size: 3rem;
            margin: 10px 0;
            color: white;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 15px; box-sizing: border-box; }
        .white-box {
            background-color: rgba(255, 255, 255, 0.95); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 8px; padding: 40px; margin-bottom: 30px; width: 100%; box-sizing: border-box;
        }
        
        .details-box { border: 2px solid #eebbc3; margin-top: -50px; }

        /* NAMA PENGANTIN PENUH: Saiz dikurangkan 40% (asal 2.8rem -> kini 1.7rem) */
        .bride-groom-names {
            font-family: 'Cintarini', cursive;
            font-size: 1.7rem; 
            color: #2c3e50;
            line-height: 1.2;
            margin: 20px 0;
        }

        .parents-name { font-size: 1.1rem; font-weight: bold; color: #2c3e50; margin: 5px 0; }
        .and-text { font-family: 'Playfair Display', serif; font-style: italic; margin: 5px 0; color: #888; }

        .btn {
            display: inline-block; margin: 10px 5px; padding: 12px 25px;

        }
        .btn:hover { background-color: #d4af37; }

        .time { font-weight: bold; color: #2c3e50; width: 30%; }
